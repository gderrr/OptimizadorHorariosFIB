name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verificar VITE_CLIENT_ID
        run: |
          if [ -z "$VITE_CLIENT_ID" ]; then
            echo "::error::VITE_CLIENT_ID vacío. Configúralo en Settings → Secrets and variables → Actions (Repository secrets) o en el environment github-pages."
            exit 1
          fi
        env:
          VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
      - run: npm ci
      - run: npm run build
        env:
          VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
